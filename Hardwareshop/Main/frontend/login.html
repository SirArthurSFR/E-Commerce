<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Minha Loja</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hidden { display: none; }
    </style>
</head>

<body class="body-login">

<div class="login-container">

    <p id="mensagem-erro" class="mensagem-erro"></p>

    <!-- FORMULÁRIO DE LOGIN -->
    <form class="login-form" id="form-login" onsubmit="fazerLogin(event)">
        <a class="botao-retornar" href="index.html">← Retornar à tela inicial</a>
        <h2>Acesse sua Conta</h2>
        <p>Bem-vindo de volta!</p>

        <div class="input-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Digite seu email" required>
        </div>

        <div class="input-group">
            <label for="login-senha">Senha</label>
            <input type="password" id="login-senha" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-acessar" id="btn-login">Entrar</button>

        <div class="login-footer">
            <p>Não tem uma conta? <a href="#" onclick="toggleForm()">Cadastre-se</a></p>
        </div>
    </form>

    <!-- FORMULÁRIO DE CADASTRO -->
    <form class="login-form hidden" id="form-cadastro" onsubmit="fazerCadastro(event)">
        <h2>Crie sua Conta</h2>
        <p>Preencha os dados abaixo.</p>

        <div class="input-group">
            <label for="cad-nome">Nome Completo</label>
            <input type="text" id="cad-nome" placeholder="Seu nome completo" required>
        </div>

        <div class="input-group">
            <label for="cad-email">Email</label>
            <input type="email" id="cad-email" placeholder="exemplo@email.com" required>
        </div>

        <div class="input-group">
            <label for="cad-senha">Senha</label>
            <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>

        <button type="submit" class="btn-acessar" id="btn-cadastro">Cadastrar</button>

        <div class="login-footer">
            <p>Já tem uma conta? <a href="#" onclick="toggleForm()">Faça Login</a></p>
            <a href="index.html">← Voltar para a Loja</a>
        </div>
    </form>

</div>

<script>

    const API = "http://localhost:8080";

    function toggleForm() {
        document.getElementById("form-login").classList.toggle("hidden");
        document.getElementById("form-cadastro").classList.toggle("hidden");
        limparErro();
    }

    function mostrarErro(mensagem) {
        document.getElementById("mensagem-erro").textContent = mensagem;
    }

    function limparErro() {
        document.getElementById("mensagem-erro").textContent = "";
    }

    async function fazerLogin(event) {
        event.preventDefault();
        limparErro();

        const email = document.getElementById("login-email").value;
        const senha = document.getElementById("login-senha").value;
        const botao = document.getElementById("btn-login");

        botao.disabled = true;
        botao.textContent = "Entrando...";

        try {
            const resposta = await fetch(`${API}/usuarios/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email, senha: senha })
            });

            const dados = await resposta.json();

            if (!resposta.ok) {
                mostrarErro(dados.erro || "Não foi possível entrar.");
                return;
            }

            // guarda token + dados do usuário para o restante do site (em memória do navegador)
            localStorage.setItem("hardforce_sessao", JSON.stringify(dados));
            window.location.href = "index.html";
        } catch (erro) {
            mostrarErro("Não foi possível conectar ao servidor. Verifique se o backend está rodando em localhost:8080.");
        } finally {
            botao.disabled = false;
            botao.textContent = "Entrar";
        }
    }

    async function fazerCadastro(event) {
        event.preventDefault();
        limparErro();

        const nome  = document.getElementById("cad-nome").value;
        const email = document.getElementById("cad-email").value;
        const senha = document.getElementById("cad-senha").value;
        const botao = document.getElementById("btn-cadastro");

        botao.disabled = true;
        botao.textContent = "Cadastrando...";

        try {
            const resposta = await fetch(`${API}/usuarios/cadastro`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nome: nome, email: email, senha: senha })
            });

            const dados = await resposta.json();

            if (!resposta.ok) {
                mostrarErro(dados.erro || "Não foi possível cadastrar.");
                return;
            }

            toggleForm();
            document.getElementById("login-email").value = email;
            document.getElementById("form-cadastro").reset();
            mostrarErro("Cadastro realizado! Agora faça login com seu e-mail e senha.");
        } catch (erro) {
            mostrarErro("Não foi possível conectar ao servidor. Verifique se o backend está rodando em localhost:8080.");
        } finally {
            botao.disabled = false;
            botao.textContent = "Cadastrar";
        }
    }

</script>

</body>
</html>
